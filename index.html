<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mini Kindle</title>
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F4A38">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --linen:#EFEDE6; --ink:#23211C; --ink-soft:#6B665B;
    --green:#1F4A38; --green-soft:#2E6B51; --card:#FBFAF6;
    --line:#D8D4C8; --ribbon:#B23A2E;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  button,input{touch-action:manipulation}
  body{background:var(--linen);color:var(--ink);font-family:var(--serif);min-height:100vh}
  button{font-family:var(--sans);cursor:pointer}

  /* ---------- LIBRARY ---------- */
  #library{max-width:960px;margin:0 auto;padding:calc(20px + env(safe-area-inset-top)) 18px 80px}
  .masthead{display:flex;align-items:baseline;justify-content:space-between;
    border-bottom:3px double var(--ink);padding-bottom:12px;gap:16px;flex-wrap:wrap}
  .masthead h1{font-size:30px;font-weight:600;letter-spacing:.5px}
  .masthead h1 em{font-style:italic;color:var(--green)}
  .shelf-count{font-family:var(--sans);font-size:13px;color:var(--ink-soft)}
  .upload-row{display:flex;gap:10px;align-items:center;margin:16px 0 26px;flex-wrap:wrap}
  .btn{border:1.5px solid var(--ink);background:var(--card);color:var(--ink);
    padding:11px 18px;border-radius:4px;font-size:15px}
  .btn.primary{background:var(--green);border-color:var(--green);color:#fff}
  .hint{font-family:var(--sans);font-size:12.5px;color:var(--ink-soft)}

  .shelf{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
  .book{background:var(--card);border:1px solid var(--line);border-left:6px solid var(--green);
    border-radius:3px;padding:16px 14px 12px;position:relative;display:flex;flex-direction:column;
    min-height:130px;box-shadow:0 1px 0 rgba(0,0,0,.05)}
  .book .title{font-size:15.5px;line-height:1.35;font-weight:600;overflow-wrap:anywhere;flex:1}
  .book .meta{font-family:var(--sans);font-size:11.5px;color:var(--ink-soft);margin-top:10px}
  .book .bar{height:4px;background:var(--line);border-radius:2px;margin-top:8px;overflow:hidden}
  .book .bar i{display:block;height:100%;background:var(--green)}
  .book .ribbon{position:absolute;top:-4px;right:12px;width:13px;height:30px;background:var(--ribbon);
    clip-path:polygon(0 0,100% 0,100% 100%,50% 78%,0 100%);display:none}
  .book.started .ribbon{display:block}
  .book .del{position:absolute;bottom:8px;right:8px;border:none;background:none;
    color:var(--ink-soft);font-size:12px;padding:6px}
  .empty{border:1.5px dashed var(--line);border-radius:6px;padding:50px 20px;text-align:center;
    color:var(--ink-soft);font-style:italic;font-size:16px}
  #status{font-family:var(--sans);font-size:13px;color:var(--green);min-height:18px;margin-bottom:8px}

  /* ---------- READER ---------- */
  #reader{display:none;flex-direction:column;height:100vh;height:100dvh}
  #reader.open{display:flex}
  body.reading #library{display:none}
  body.reading{overscroll-behavior:none}
  /* ---- top bar: three aligned zones ---- */
  .toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;
    padding-top:calc(8px + env(safe-area-inset-top));
    font-family:var(--sans);border-bottom:1px solid var(--line);background:var(--card)}
  .toolbar .title{font-family:var(--serif);font-weight:600;font-size:15.5px;flex:1;
    text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tbtn{border:1px solid var(--line);background:transparent;color:inherit;border-radius:8px;
    padding:9px 12px;font-size:13px;line-height:1;white-space:nowrap}
  .tbtn.active{background:var(--green);border-color:var(--green);color:#fff}
  .barlink{border:none;background:none;color:inherit;font-size:14px;font-weight:600;
    padding:6px 2px;white-space:nowrap;flex:none}
  /* hamburger menu button */
  .menu-btn{border:none;background:none;padding:8px 4px;flex:none;
    display:flex;flex-direction:column;gap:4px;justify-content:center;width:34px}
  .menu-btn span{display:block;height:2px;width:20px;background:currentColor;border-radius:2px;
    transition:.2s}
  .menu-btn.on span:nth-child(1){transform:translateY(6px) rotate(45deg)}
  .menu-btn.on span:nth-child(2){opacity:0}
  .menu-btn.on span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}

  /* ---- dropdown menu ---- */
  #backdrop{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.15)}
  #backdrop[hidden]{display:none}
  #menu{position:fixed;z-index:50;top:calc(52px + env(safe-area-inset-top));right:10px;
    width:min(290px,calc(100vw - 20px));background:var(--card);color:var(--ink);
    border:1px solid var(--line);border-radius:14px;padding:6px;
    box-shadow:0 12px 40px rgba(35,33,28,.25);font-family:var(--sans)}
  #menu[hidden]{display:none}
  .menu-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 8px}
  .menu-row label{font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft)}
  .menu-sep{height:1px;background:var(--line);margin:2px 6px}
  .segbtns{display:flex;gap:6px}
  .pagejump{display:flex;align-items:center;gap:5px}
  #pageBox{width:44px;text-align:center;border:1px solid var(--line);border-radius:8px;
    padding:8px 2px;font-size:14px;background:transparent;color:inherit}
  #pageTotal{font-size:13px;color:var(--ink-soft);white-space:nowrap}
  .menu-note{font-size:11.5px;line-height:1.45;color:var(--ink-soft);padding:4px 8px 8px;margin:0}

  /* page indicator pill */
  #pagePill{position:fixed;left:50%;transform:translateX(-50%);
    bottom:calc(10px + env(safe-area-inset-bottom));z-index:20;pointer-events:none;
    font-family:var(--sans);font-size:12px;padding:4px 12px;border-radius:20px;
    background:rgba(35,33,28,.55);color:#fff;opacity:0;transition:opacity .3s}
  #pagePill.show{opacity:1}
  /* toast message */
  #toast{position:fixed;left:50%;transform:translateX(-50%);
    bottom:calc(44px + env(safe-area-inset-bottom));z-index:60;pointer-events:none;
    max-width:min(340px,calc(100vw - 32px));text-align:center;
    font-family:var(--sans);font-size:12.5px;line-height:1.4;padding:10px 14px;border-radius:12px;
    background:rgba(35,33,28,.9);color:#fff;opacity:0;transition:opacity .25s}
  #toast.show{opacity:1}

  #stage{flex:1;overflow:auto;display:flex;padding:12px;
    padding-bottom:calc(12px + env(safe-area-inset-bottom))}
  #pageCanvas{box-shadow:0 4px 24px rgba(0,0,0,.28);height:auto;margin:auto;flex:none}
  #loading{font-family:var(--sans);color:var(--ink-soft);padding:40px;margin:auto}
  /* reflow / text mode */
  #textView{width:min(40em,100%);margin:0 auto;padding:6px 6px 60px;line-height:1.62;
    font-family:var(--serif)}
  #textView p{margin:0 0 1em;text-align:justify;-webkit-hyphens:auto;hyphens:auto;overflow-wrap:break-word}
  #textView .noText{font-family:var(--sans);font-style:italic;text-align:center;
    margin-top:40px;opacity:.75}

  /* reading themes */
  body[data-theme="paper"] #reader{background:#DCD7C9}
  body[data-theme="paper"] #textView{color:#2a2822}
  body[data-theme="sepia"] #reader{background:#D9C7A7}
  body[data-theme="sepia"] .toolbar{background:#EFE0C3;border-color:#C9B893;color:#4A3B25}
  body[data-theme="sepia"] #menu{background:#EFE0C3;border-color:#C9B893;color:#4A3B25}
  body[data-theme="sepia"] #pageCanvas{filter:sepia(.45) contrast(.96) brightness(.98)}
  body[data-theme="sepia"] #textView{color:#4A3B25}
  body[data-theme="night"] #reader{background:#14151A}
  body[data-theme="night"] .toolbar{background:#1E2026;border-color:#33363F;color:#C9CAD1}
  body[data-theme="night"] #menu{background:#1E2026;border-color:#33363F;color:#C9CAD1}
  body[data-theme="night"] #pageCanvas{filter:invert(.93) hue-rotate(180deg) contrast(.92) brightness(.9)}
  body[data-theme="night"] #textView{color:#C9CAD1}
</style>
</head>
<body data-theme="paper">

<!-- ================= LIBRARY ================= -->
<div id="library">
  <div class="masthead">
    <h1>My <em>Shelf</em></h1>
    <span class="shelf-count" id="count"></span>
  </div>
  <div class="upload-row">
    <button class="btn primary" onclick="document.getElementById('file').click()">Add PDFs</button>
    <input type="file" id="file" accept="application/pdf,.pdf" multiple hidden>
    <span class="hint">Books are stored inside this browser — nothing is uploaded anywhere.</span>
  </div>
  <div id="status"></div>
  <div class="shelf" id="shelf"></div>
</div>

<!-- ================= READER ================= -->
<div id="reader">
  <div class="toolbar">
    <button class="barlink" onclick="closeReader()">‹ Shelf</button>
    <span class="title" id="bookTitle"></span>
    <button class="menu-btn" id="menuBtn" onclick="toggleSettings()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>

  <div id="backdrop" hidden onclick="closeSettings()"></div>
  <div id="menu" hidden>
    <div class="menu-row">
      <button class="tbtn" onclick="turn(-1)">‹ Prev</button>
      <span class="pagejump"><input id="pageBox" inputmode="numeric"><span id="pageTotal"></span></span>
      <button class="tbtn" onclick="turn(1)">Next ›</button>
    </div>
    <div class="menu-sep"></div>
    <div class="menu-row">
      <label>Text size</label>
      <div class="segbtns">
        <button class="tbtn" onclick="zoom(-0.15)">A−</button>
        <button class="tbtn" onclick="zoom(0.15)">A+</button>
      </div>
    </div>
    <div class="menu-row">
      <label>Theme</label>
      <div class="segbtns">
        <button class="tbtn" id="th-paper" onclick="setTheme('paper')">Day</button>
        <button class="tbtn" id="th-sepia" onclick="setTheme('sepia')">Sepia</button>
        <button class="tbtn" id="th-night" onclick="setTheme('night')">Night</button>
      </div>
    </div>
    <div class="menu-row">
      <label>Layout</label>
      <div class="segbtns">
        <button class="tbtn" id="modeBtn" onclick="toggleMode()">Reflow</button>
      </div>
    </div>
    <p class="menu-note" id="menuNote"></p>
  </div>

  <div id="stage"><div id="loading">Opening book…</div><canvas id="pageCanvas" hidden></canvas><div id="textView" hidden></div></div>
  <div id="pagePill"></div>
  <div id="toast"></div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const $ = id => document.getElementById(id);
const store = {
  get:(k,d)=>{const v=localStorage.getItem("mk:"+k);return v===null?d:JSON.parse(v)},
  set:(k,v)=>localStorage.setItem("mk:"+k,JSON.stringify(v))
};

/* ---------- IndexedDB: books live inside the browser ---------- */
const idb = {
  db: null,
  open(){
    return new Promise((res, rej) => {
      if (this.db) return res(this.db);
      const req = indexedDB.open("minikindle", 1);
      req.onupgradeneeded = () => req.result.createObjectStore("books", {keyPath:"name"});
      req.onsuccess = () => { this.db = req.result; res(this.db); };
      req.onerror = () => rej(req.error);
    });
  },
  tx(mode){ return this.db.transaction("books", mode).objectStore("books"); },
  put(book){ return new Promise((res,rej)=>{ const r=this.tx("readwrite").put(book); r.onsuccess=res; r.onerror=()=>rej(r.error); }); },
  all(){ return new Promise((res,rej)=>{ const r=this.tx("readonly").getAll(); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); },
  get(name){ return new Promise((res,rej)=>{ const r=this.tx("readonly").get(name); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); },
  del(name){ return new Promise((res,rej)=>{ const r=this.tx("readwrite").delete(name); r.onsuccess=res; r.onerror=()=>rej(r.error); }); }
};

/* ---------- library ---------- */
async function loadShelf(){
  await idb.open();
  const books = (await idb.all()).sort((a,b)=>a.name.localeCompare(b.name));
  $("count").textContent = books.length ? books.length+" book"+(books.length>1?"s":"") : "";
  const shelf = $("shelf");
  shelf.innerHTML = "";
  if(!books.length){
    shelf.innerHTML = '<div class="empty" style="grid-column:1/-1">The shelf is empty. Tap “Add PDFs” to begin.</div>';
    return;
  }
  for(const b of books){
    const pos = store.get("pos:"+b.name, 0);
    const total = store.get("total:"+b.name, 0);
    const pct = total ? Math.round(pos/total*100) : 0;
    const card = document.createElement("div");
    card.className = "book"+(pos>1?" started":"");
    card.innerHTML = `
      <span class="ribbon"></span>
      <div class="title">${esc(b.name.replace(/\.pdf$/i,""))}</div>
      <div class="meta">${pos>1 ? "Page "+pos+(total?" of "+total+" · "+pct+"%":"") : "Not started"}
        · ${(b.size/1048576).toFixed(1)} MB</div>
      <div class="bar"><i style="width:${pct}%"></i></div>
      <button class="del">remove</button>`;
    card.querySelector(".title").onclick = () => openBook(b.name);
    card.querySelector(".del").onclick = async e => {
      e.stopPropagation();
      if(confirm('Remove "'+b.name+'" from the shelf?')){
        await idb.del(b.name);
        loadShelf();
      }
    };
    shelf.appendChild(card);
  }
}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}

$("file").onchange = async e => {
  await idb.open();
  const files = [...e.target.files];
  let done = 0;
  for(const f of files){
    $("status").textContent = "Saving “"+f.name+"”…";
    const data = await f.arrayBuffer();
    await idb.put({name:f.name, size:f.size, data});
    done++;
  }
  $("status").textContent = done ? done+" book"+(done>1?"s":"")+" added to the shelf." : "";
  setTimeout(()=>$("status").textContent="", 3000);
  e.target.value = "";
  loadShelf();
};

/* ---------- reader ---------- */
let doc=null, current=1, target=1, zoomLevel=1, bookName="", rendering=false, pending=null;
let viewMode = store.get("viewMode","page");     // "page" (exact) or "text" (reflow)
let textSize = store.get("textSize", 19);         // font size for reflow mode
let pageHasText = true;                            // does the current page have extractable text
let bookHasText = true;                            // does the book contain real text at all

async function openBook(name){
  bookName = name;
  document.body.classList.add("reading");
  $("reader").classList.add("open");
  $("bookTitle").textContent = name.replace(/\.pdf$/i,"");
  $("loading").hidden = false; $("pageCanvas").hidden = true; $("textView").hidden = true;
  updateModeBtn();
  const rec = await idb.get(name);
  if(!rec){ alert("Book not found."); return closeReader(); }
  doc = await pdfjsLib.getDocument({data: rec.data.slice(0)}).promise;
  store.set("total:"+name, doc.numPages);
  $("pageTotal").textContent = "/ "+doc.numPages;
  zoomLevel = store.get("zoom:"+name, 1);
  current = Math.min(store.get("pos:"+name, 1) || 1, doc.numPages);
  target = current;
  // does this book contain real (selectable) text? check a couple of pages
  bookHasText = await detectBookText();
  render(current);
}

// sample a few pages to decide if the PDF is text-based or scanned images
async function detectBookText(){
  const probes = [current, 1, Math.ceil(doc.numPages/2), doc.numPages]
    .filter((v,i,a)=>a.indexOf(v)===i && v>=1 && v<=doc.numPages);
  for(const pn of probes){
    try{
      const t = await extractText(await doc.getPage(pn));
      if(t && t.replace(/\s/g,"").length > 20) return true;
    }catch(e){}
  }
  return false;
}

async function render(n){
  if(!doc) return;
  if(rendering){ pending = n; return; }
  rendering = true;
  current = Math.max(1, Math.min(n, doc.numPages));
  target = current;
  const page = await doc.getPage(current);
  if(viewMode === "text") await renderText(page);
  else await renderPage(page);
  $("pageBox").value = current;
  store.set("pos:"+bookName, current);          // remember where I am
  $("stage").scrollTop = 0;
  $("stage").scrollLeft = 0;
  showPill();
  updateNote();
  rendering = false;
  if(pending!==null){const p=pending;pending=null;render(p);}
}

let pillTimer=null;
function showPill(){
  if(!doc) return;
  const pill = $("pagePill");
  pill.textContent = current + " / " + doc.numPages;
  pill.classList.add("show");
  clearTimeout(pillTimer);
  pillTimer = setTimeout(()=>pill.classList.remove("show"), 1600);
}

async function renderPage(page){
  $("textView").hidden = true;
  const stageW = $("stage").clientWidth - 24;
  const base = page.getViewport({scale:1});
  const scale = (stageW / base.width) * zoomLevel;
  const displayW = base.width * scale;               // size shown on screen
  let dpr = Math.min(window.devicePixelRatio || 1, 2);
  let vp = page.getViewport({scale: scale * dpr});
  // iPhones refuse canvases above ~16.7M pixels — shrink internal resolution if needed
  const MAXPIX = 15000000, MAXSIDE = 4096;
  if (vp.width * vp.height > MAXPIX || vp.width > MAXSIDE || vp.height > MAXSIDE){
    const f = Math.min(Math.sqrt(MAXPIX/(vp.width*vp.height)), MAXSIDE/vp.width, MAXSIDE/vp.height);
    vp = page.getViewport({scale: scale * dpr * f});
  }
  const canvas = $("pageCanvas");
  canvas.width = vp.width; canvas.height = vp.height;
  canvas.style.width = displayW + "px";
  await page.render({canvasContext:canvas.getContext("2d"), viewport:vp}).promise;
  $("loading").hidden = true; canvas.hidden = false;
}

async function renderText(page){
  const txt = await extractText(page);
  const tv = $("textView");
  $("pageCanvas").hidden = true;
  $("loading").hidden = true;
  tv.hidden = false;
  tv.style.fontSize = textSize + "px";
  if(!txt || txt.replace(/\s/g,"").length < 3){
    pageHasText = false;
    if(bookHasText){
      // book is text-based; this page is just artwork (cover, illustration)
      tv.innerHTML = '<p class="noText">This page is an image (cover or artwork) — turn the page, the rest of the book has resizable text. Or switch Layout to “Page” to see it.</p>';
    } else {
      const cached = ocrCache[bookName+":"+current];
      if(cached){ tv.innerHTML = cached; pageHasText = true; return; }
      tv.innerHTML = '<p class="noText">This is a scanned page (a picture of text). I can try to read it with OCR and turn it into resizable text.</p>'
        + '<p style="text-align:center"><button class="tbtn" onclick="runOcr()">🔍 Recognize text (OCR)</button></p>'
        + '<p class="noText" style="font-size:.85em">Needs internet · works best on clear English scans · or switch Layout to “Page” and zoom.</p>';
    }
    return;
  }
  pageHasText = true;
  tv.innerHTML = txt.split(/\n\n+/).map(p => "<p>"+esc(p)+"</p>").join("");
}

/* ---------- OCR for scanned pages (lazy-loaded, cached per page) ---------- */
const ocrCache = {};
function loadScript(src){
  return new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = src; s.onload = res; s.onerror = () => rej(new Error("load failed"));
    document.head.appendChild(s);
  });
}
async function runOcr(){
  if(!doc) return;
  const tv = $("textView"), pageAtStart = current;
  try{
    tv.innerHTML = '<p class="noText">Reading the page… this can take ~10–30 seconds.</p><p class="noText" id="ocrProg"></p>';
    // draw the page big and sharp for better recognition
    const page = await doc.getPage(pageAtStart);
    const vp = page.getViewport({scale: 2});
    const c = document.createElement("canvas");
    c.width = vp.width; c.height = vp.height;
    await page.render({canvasContext: c.getContext("2d"), viewport: vp}).promise;
    if(!window.Tesseract){
      const prog = $("ocrProg"); if(prog) prog.textContent = "Loading the reader engine…";
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.0/tesseract.min.js");
    }
    const result = await Tesseract.recognize(c, "eng", {logger: m => {
      const prog = $("ocrProg");
      if(prog && m.status === "recognizing text")
        prog.textContent = "Recognizing… " + Math.round((m.progress||0)*100) + "%";
    }});
    if(current !== pageAtStart) return;              // user moved on meanwhile
    const text = (result && result.data && result.data.text || "").trim();
    if(!text || text.replace(/\s/g,"").length < 3){
      tv.innerHTML = '<p class="noText">Couldn’t find readable text on this page. Switch Layout to “Page” and zoom instead.</p>';
      return;
    }
    const htmlOut = text.split(/\n\s*\n+/).map(p => "<p>"+esc(p.replace(/\n/g," "))+"</p>").join("");
    ocrCache[bookName+":"+pageAtStart] = htmlOut;    // remember for this session
    pageHasText = true;
    tv.innerHTML = htmlOut;
    tv.style.fontSize = textSize + "px";
    toast("Text recognized — A− / A+ now resizes it. OCR isn’t perfect; forgive small mistakes.");
  }catch(err){
    tv.innerHTML = '<p class="noText">OCR couldn’t run (check your internet connection). Switch Layout to “Page” and zoom instead.</p>';
  }
}

// pull readable, reflowable text out of a PDF page
async function extractText(page){
  const tc = await page.getTextContent();
  const items = tc.items.filter(i => typeof i.str === "string");
  if(!items.length) return "";
  const heights = items.map(i => Math.abs(i.transform[3]) || i.height || 0)
                       .filter(h => h > 0).sort((a,b)=>a-b);
  const lineH = heights.length ? heights[Math.floor(heights.length/2)] : 12;
  let out = "", prevY = null, prevXEnd = null;
  for(const it of items){
    const x = it.transform[4], y = it.transform[5], w = it.width || 0;
    if(prevY !== null){
      const gap = prevY - y;
      if(Math.abs(gap) > lineH * 1.8){                 // big jump = new paragraph
        out = out.replace(/ +$/,"") + "\n\n";
        prevXEnd = null;
      } else if(Math.abs(gap) > lineH * 0.4){          // next visual line
        if(out.endsWith("-")) out = out.slice(0,-1);   // join hyphenated word
        else if(!/\s$/.test(out)) out += " ";
        prevXEnd = null;
      } else if(prevXEnd !== null && x - prevXEnd > lineH*0.25
                && !/\s$/.test(out) && it.str && !/^\s/.test(it.str)){
        out += " ";                                    // gap on same line
      }
    }
    out += it.str;
    prevY = y; prevXEnd = x + w;
  }
  return out.replace(/\n{3,}/g,"\n\n").trim();
}

function turn(d){
  if(!doc) return;
  target = Math.max(1, Math.min(target + d, doc.numPages));
  render(target);
}
function zoom(d){
  if(viewMode === "text"){
    textSize = Math.max(13, Math.min(46, textSize + (d > 0 ? 2 : -2)));
    store.set("textSize", textSize);
    $("textView").style.fontSize = textSize + "px";   // instant reflow, no re-render
    updateNote();
    return;
  }
  // in Page layout: if the book has real text, A± should resize text like Kindle,
  // so switch into Reflow automatically. Otherwise (scanned images) zoom the page.
  if(bookHasText){
    viewMode = "text";
    store.set("viewMode", viewMode);
    updateModeBtn();
    textSize = Math.max(13, Math.min(46, textSize + (d > 0 ? 2 : -2)));
    store.set("textSize", textSize);
    toast("Text mode — A− / A+ now resizes text. Tap ☰ › Layout › Page for the exact page.");
    render(current);
    return;
  }
  zoomLevel = Math.max(0.5, Math.min(3, zoomLevel+d));
  store.set("zoom:"+bookName, zoomLevel);
  toast("Scanned book — zooming the image. Tip: ☰ › Layout › Reflow offers OCR to make real text.");
  render(current);
}

let toastTimer=null;
function toast(msg){
  let el = $("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("show"), 3200);
}
function openSettings(){
  $("menu").hidden = false;
  $("backdrop").hidden = false;
  $("menuBtn").classList.add("on");
  updateNote();
}
function closeSettings(){
  $("menu").hidden = true;
  $("backdrop").hidden = true;
  $("menuBtn").classList.remove("on");
}
function toggleSettings(){
  if($("menu").hidden) openSettings(); else closeSettings();
}
function updateNote(){
  const note = $("menuNote");
  if(!note) return;
  if(viewMode === "text"){
    note.textContent = pageHasText
      ? "A− / A+ resizes the text and rewraps it to fit, like Kindle."
      : "This page is an image. Use the OCR button to turn it into text, or switch to Page layout and zoom.";
  } else {
    note.textContent = "Page layout shows the exact PDF. A− / A+ zooms in and out. Try Reflow for resizable text.";
  }
}
function updateModeBtn(){
  const b = $("modeBtn");
  if(!b) return;
  b.textContent = viewMode === "text" ? "Page" : "Reflow";
  b.title = viewMode === "text"
    ? "Switch to the exact original page"
    : "Switch to resizable, reflowing text (Kindle-style)";
}
function toggleMode(){
  viewMode = viewMode === "text" ? "page" : "text";
  store.set("viewMode", viewMode);
  updateModeBtn();
  render(current);
}
$("pageBox").addEventListener("change", e=>{
  const n = parseInt(e.target.value,10);
  if(!isNaN(n)) render(n);
});
function closeReader(){
  document.body.classList.remove("reading");
  $("reader").classList.remove("open");
  closeSettings();
  doc = null;
  loadShelf();
}

/* themes */
function setTheme(t){
  document.body.dataset.theme = t;
  store.set("theme", t);
  for(const x of ["paper","sepia","night"])
    $("th-"+x).classList.toggle("active", x===t);
}
setTheme(store.get("theme","paper"));

/* swipe or tap edges to turn pages */
let tx=0, ty=0, tt=0;
const stage = $("stage");
stage.addEventListener("touchstart", e=>{
  tx = e.touches[0].clientX; ty = e.touches[0].clientY; tt = Date.now();
}, {passive:true});
stage.addEventListener("touchend", e=>{
  if(!doc) return;
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  const zoomedWide = stage.scrollWidth > stage.clientWidth + 5;
  // swipe: horizontal movement wins (only when the page fits the screen width)
  if(!zoomedWide && Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)){
    turn(dx < 0 ? 1 : -1);
    return;
  }
  // tap zones: quick tap on right third = next, left third = previous
  if(Math.abs(dx) < 10 && Math.abs(dy) < 10 && Date.now() - tt < 350){
    const x = e.changedTouches[0].clientX, w = window.innerWidth;
    if(x > w*0.66) turn(1);
    else if(x < w*0.33) turn(-1);
  }
}, {passive:true});

/* keyboard (when used on a computer) */
document.addEventListener("keydown", e=>{
  if(!doc || e.target.tagName==="INPUT") return;
  if(e.key==="ArrowRight"||e.key===" ") turn(1);
  if(e.key==="ArrowLeft") turn(-1);
  if(e.key==="Escape") closeReader();
});
window.addEventListener("resize", ()=>{ if(doc) render(current); });

/* ask the browser to keep this site's storage safe from cleanup */
if(navigator.storage && navigator.storage.persist) navigator.storage.persist();

loadShelf();
</script>
</body>
